        const pct = (count / maxCount) * 100;
        row.innerHTML = `
          <span class="activity-bar-label" title="${toolName}">${toolName}</span>
          <div class="activity-bar-track">
            <div class="activity-bar-fill" style="width: ${pct}%"></div>
          </div>
          <span class="activity-bar-count">${count}</span>
        `;
        chartEl.appendChild(row);
      }
    }

    function showTokenTooltip(e) {
      const data = JSON.parse(e.target.dataset.tooltip);
      const total = data.input + data.output + data.cache;
      tokenTooltipEl.innerHTML = `
        <div class="token-detail-row"><span class="token-detail-label">Period</span><span class="token-detail-value total">${data.label}</span></div>
        <div class="token-detail-divider"></div>
        <div class="token-detail-row"><span class="token-detail-label">Input</span><span class="token-detail-value input">${formatNumber(data.input)}</span></div>
        <div class="token-detail-row"><span class="token-detail-label">Output</span><span class="token-detail-value output">${formatNumber(data.output)}</span></div>
        <div class="token-detail-row"><span class="token-detail-label">Cache</span><span class="token-detail-value cache">${formatNumber(data.cache)}</span></div>
        <div class="token-detail-divider"></div>
        <div class="token-detail-row"><span class="token-detail-label">Total</span><span class="token-detail-value total">${formatNumber(total)}</span></div>
      `;
      tokenTooltipEl.classList.add('visible');
      moveTokenTooltip(e);
    }

    function moveTokenTooltip(e) {
      const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;
      const y = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      tokenTooltipEl.style.left = (x + 12) + 'px';
      tokenTooltipEl.style.top = (y - 10) + 'px';
      // Keep tooltip on screen
      const rect = tokenTooltipEl.getBoundingClientRect();
      if (rect.right > window.innerWidth) {
        tokenTooltipEl.style.left = (x - rect.width - 12) + 'px';
      }
      if (rect.bottom > window.innerHeight) {
        tokenTooltipEl.style.top = (y - rect.height - 10) + 'px';
      }
    }

    function hideTokenTooltip() {
      tokenTooltipEl.classList.remove('visible');
    }

    // Period toggle buttons
    document.querySelectorAll('.token-period-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.token-period-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tokenPeriod = btn.dataset.period;
        renderTokenStats();
      });
    });

    // Helper for period label formatting
    function formatHourLabel(key) {
      const [datePart, hourPart] = key.split(' ');
      return datePart.slice(5) + ' ' + hourPart + ':00';
    }

    // Tokens button
    btnTokensEl.addEventListener('click', () => {
      openTokenScreen();
    });

    // Token back button
    tokenBackEl.addEventListener('click', () => {
      closeTokenScreen();
    });

    // ─── New session ────────────────────────────────────────────────────────── so the mobile keyboard doesn't
    // cover the input field — iOS Safari doesn't shrink dvh when the keyboard opens.
    const vv = window.visualViewport;
    if (vv) {
      const applyViewportHeight = () => {
        document.documentElement.style.setProperty('--app-height', vv.height + 'px');
      };
      vv.addEventListener('resize', applyViewportHeight);
      vv.addEventListener('scroll', applyViewportHeight);
      applyViewportHeight();
    }

    // ─── New session ────────────────────────────────────────────────────────────
    const CUSTOM_DIR = '__custom__';

    // Unique project directories from existing sessions, most-recent first.
    function recentDirs() {
      const seen = new Set();
      const dirs = [];
      for (const s of state.sessions) {
        if (s.cwd && !seen.has(s.cwd)) {
          seen.add(s.cwd);
          dirs.push(s.cwd);
        }
      }
      return dirs;
    }

    function openNewSessionDialog() {
      const dirs = recentDirs();
      newDirSelectEl.innerHTML = '';
      for (const dir of dirs) {
        const opt = document.createElement('option');
        opt.value = dir;
        opt.textContent = (dir.split(/[\\/]/).pop() || dir) + '  —  ' + dir;
        newDirSelectEl.appendChild(opt);
      }
      const customOpt = document.createElement('option');
      customOpt.value = CUSTOM_DIR;
      customOpt.textContent = '+ Custom path…';
      newDirSelectEl.appendChild(customOpt);

      // Default to the most recent dir (or custom if there are none).
      if (dirs.length) {
        newDirSelectEl.value = dirs[0];
        newDirPathEl.value = dirs[0];
      } else {
        newDirSelectEl.value = CUSTOM_DIR;
        newDirPathEl.value = '';
      }
      newSessionModalEl.classList.add('visible');
      newDirPathEl.focus();
    }

    function closeNewSessionDialog() {
      newSessionModalEl.classList.remove('visible');
    }

    function createNewSession() {
      const cwd = newDirPathEl.value.trim();
      if (!cwd) {
        showToast('Enter a project directory.', 'error');
        return;
      }
      console.log('[New] Sending new_session request cwd=', cwd);
      send({ type: 'new_session', cwd });
      closeNewSessionDialog();
      // The session_update handler sets up the chat view once the server confirms;
      // on failure (e.g. bad directory) an error toast shows and the view is unchanged.
    }

    btnNewEl.addEventListener('click', openNewSessionDialog);
    newCancelEl.addEventListener('click', closeNewSessionDialog);
    newCreateEl.addEventListener('click', createNewSession);
    newSessionModalEl.addEventListener('click', (e) => {
      if (e.target === newSessionModalEl) closeNewSessionDialog();
    });
    // Selecting a recent dir fills the path field; Custom clears it to type a new one.
    newDirSelectEl.addEventListener('change', () => {
      if (newDirSelectEl.value === CUSTOM_DIR) {
        newDirPathEl.value = '';
        newDirPathEl.focus();
      } else {
        newDirPathEl.value = newDirSelectEl.value;
      }
    });
    newDirPathEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); createNewSession(); }
    });

    // ─── Toast ──────────────────────────────────────────────────────────────────
    function showToast(message, level = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${level}`;
      toast.textContent = message;
      toastContainerEl.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ─── Tasks Panel ────────────────────────────────────────────────────────────
    let tasksCollapsed = false;
    let selectedTaskId = null;

    function renderTasks() {

      if (!tasksPanelEl) return;

      // Show panel only when we have an active session
      const hasSession = !!state.activeSession;
      tasksPanelEl.style.display = hasSession ? 'flex' : 'none';


      if (!hasSession) return;

      const hasTasks = state.tasks && state.tasks.length > 0;

      if (!hasTasks) {
        tasksCountEl.textContent = '0';
        taskNoTasksEl.style.display = 'block';
        taskNoTasksEl.textContent = 'No tasks yet — add one below';
        const addRow = document.querySelector('.task-add-row');
        if (addRow) addRow.style.display = 'flex';
        return;
      }

      taskNoTasksEl.style.display = 'none';
      const addRow = document.querySelector('.task-add-row');
      if (addRow) addRow.style.display = 'flex';

      // Count active vs done
      const activeTasks = state.tasks.filter(t => t.status !== 'done');
      const doneTasks = state.tasks.filter(t => t.status === 'done');
      tasksCountEl.textContent = activeTasks.length;

      // Group by status
      const groups = {
        'in-progress': { label: 'In Progress', emoji: '🔨' },
        'pending': { label: 'Pending', emoji: '⏳' },
        'deferred': { label: 'Deferred', emoji: '⏸️' },
        'done': { label: 'Done', emoji: '✅' },
      };

      // Priority order for display
      const statusOrder = ['in-progress', 'pending', 'deferred', 'done'];

      // Sort tasks within groups by priority
      const priorityRank = { P0: 0, P1: 1, P2: 2, P3: 3 };

      let html = '';
      for (const status of statusOrder) {
        const groupTasks = state.tasks
          .filter(t => t.status === status)
          .sort((a, b) => priorityRank[a.priority] - priorityRank[b.priority]);

        if (groupTasks.length === 0) continue;

        const group = groups[status];
        html += `<div class="task-group">
          <div class="task-group-label">${group.emoji} ${group.label} <span class="task-group-count">${groupTasks.length}</span></div>`;

        for (const task of groupTasks) {
          const isSelected = selectedTaskId === task.id;
          const doneClass = task.status === 'done' ? 'done' : '';
          const deferredClass = task.status === 'deferred' ? 'deferred' : '';
          const checkedClass = task.status === 'done' ? 'checked' :
                               task.status === 'deferred' ? 'deferred' :
                               task.status === 'in-progress' ? 'in-progress' : '';

          html += `<div class="task-item ${doneClass} ${deferredClass} ${isSelected ? 'selected' : ''}" data-task-id="${task.id}">
            <div class="task-checkbox ${checkedClass}" data-action="toggle" data-id="${task.id}"></div>
            <div class="task-info">
              <div class="task-title-row">
                <span class="task-id">${task.id}</span>
                <span class="task-title">${escapeHtml(task.title)}</span>
                <span class="task-priority ${task.priority}">${task.priority}</span>
              </div>
              ${task.description ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(task.description)}</div>` : ''}
            </div>
            <div class="task-actions">
              ${task.status !== 'done' ? `<button class="task-action-btn complete" data-action="complete" data-id="${task.id}" title="Complete">✓</button>` : ''}
              ${task.status !== 'deferred' && task.status !== 'done' ? `<button class="task-action-btn defer" data-action="defer" data-id="${task.id}" title="Defer">⏸</button>` : ''}
              ${task.status !== 'done' ? `<button class="task-action-btn delete" data-action="delete" data-id="${task.id}" title="Delete">✕</button>` : ''}
            </div>
          </div>`;
        }

        html += '</div>';
      }

      tasksBodyEl.innerHTML = html;
    }

    function handleTaskAction(action, taskId) {
      if (!state.activeSession) return;
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      switch (action) {
        case 'toggle':
          if (task.status === 'done') {
            // Un-complete: toggle back to pending
            send({ type: 'task_action', action: 'update', id: task.id, status: 'pending' });
          } else {
            send({ type: 'task_action', action: 'complete', id: task.id });
          }
          break;
        case 'complete':
          send({ type: 'task_action', action: 'complete', id: task.id });
          break;
        case 'defer':
          send({ type: 'task_action', action: 'defer', id: task.id });
          break;
        case 'delete':
          send({ type: 'task_action', action: 'delete', id: task.id });
          break;
      }
      renderTasks();
    }

    // Task panel toggle
    tasksHeaderEl.addEventListener('click', (e) => {
      // Only toggle if not clicking on interactive elements
      if (e.target.closest('.task-checkbox') || e.target.closest('.task-action-btn')) return;
      tasksCollapsed = !tasksCollapsed;
      tasksBodyEl.classList.toggle('collapsed', tasksCollapsed);
      tasksToggleEl.classList.toggle('open', !tasksCollapsed);
    });

    // Task item clicks (checkboxes and action buttons)
    tasksBodyEl.addEventListener('click', (e) => {
      const target = e.target.closest('[data-action]');
      if (!target) {
        // Clicking on task item selects it
        const item = e.target.closest('.task-item');
        if (item) {
          selectedTaskId = item.dataset.taskId;
          renderTasks();
        }
        return;
      }
      const action = target.dataset.action;
      const id = target.dataset.id;
      if (action && id) {
        handleTaskAction(action, id);
      }
    });

    // Add task
    function addTask() {
      const title = taskAddInputEl.value.trim();
      if (!title) return;
      send({ type: 'task_action', action: 'add', title });
      taskAddInputEl.value = '';
      renderTasks();
    }

    taskAddBtnEl.addEventListener('click', addTask);
    taskAddInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTask();
      }
    });

    // ─── Scroll ─────────────────────────────────────────────────────────────────
    // Coalesce many same-frame scroll requests (e.g. one per streaming token) into a
    // single rAF callback so we don't force layout per delta.
    let scrollPending = false;
    function scrollToBottom() {
      if (scrollPending) return;
      scrollPending = true;
      requestAnimationFrame(() => {
        scrollPending = false;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    // Periodically update footer dot to reflect reconnecting state
    setInterval(() => {
      if (state.wsDownSince && state.isConnecting) {
        updateFooterDot();
      }
    }, 1000);

    // ─── Init ───────────────────────────────────────────────────────────────────
    console.log('[init] Page loaded, connecting...');
    connect();
  </script>
</body>
</html>
